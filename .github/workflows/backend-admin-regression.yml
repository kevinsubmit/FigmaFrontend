name: Backend Admin Regression Smokes

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - ".github/workflows/backend-admin-regression.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - ".github/workflows/backend-admin-regression.yml"

env:
  UPLOAD_DIR: /tmp/nailsdash-admin-regression-uploads

jobs:
  backend-admin-regression-smokes:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Admin Smoke Artifacts Directory
        run: |
          mkdir -p backend/artifacts
          rm -f backend/artifacts/admin-smoke-results.json

      - name: Build and Start Stack
        run: docker compose up -d --build

      - name: Wait for API Ready
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..60}; do
            if curl -fsS http://localhost:8000/api/openapi.json >/dev/null; then
              echo "API is ready"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready in time"
          docker compose logs backend
          docker compose logs backend-scheduler
          exit 1

      - name: Run Fine-Grained Backend Admin Regression Smokes
        run: >
          docker compose exec -T backend
          python run_admin_regression_smokes.py
          --only dashboard-admin
          --only customers-admin
          --only risk-admin
          --only security-admin
          --only logs-admin
          --results-file /app/artifacts/admin-smoke-results.json

      - name: Upload Admin Smoke Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-smoke-results
          path: backend/artifacts/admin-smoke-results.json
          if-no-files-found: warn

      - name: Append Admin Smoke Summary
        if: always()
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          results_path = Path("backend/artifacts/admin-smoke-results.json")

          with summary_path.open("a", encoding="utf-8") as summary:
              summary.write("## Admin Smoke Summary\n\n")
              if not results_path.is_file():
                  summary.write("Result file not found.\n")
                  raise SystemExit(0)

              data = json.loads(results_path.read_text(encoding="utf-8"))
              summary.write(
                  f"- schema_version: `{data.get('schema_version', 'unknown')}`\n"
                  f"- status: `{data['status']}`\n"
                  f"- duration_seconds: `{data['duration_seconds']}`\n"
                  f"- total: `{data['summary']['total']}`\n"
                  f"- passed: `{data['summary']['passed']}`\n"
                  f"- failed: `{data['summary']['failed']}`\n\n"
              )
              summary.write("| key | status | duration_seconds | returncode |\n")
              summary.write("| --- | --- | ---: | ---: |\n")
              for result in data["results"]:
                  summary.write(
                      f"| `{result['key']}` | `{result['status']}` | `{result['duration_seconds']}` | `{result['returncode']}` |\n"
                  )
          PY

      - name: Show Container Logs on Failure
        if: failure()
        run: |
          docker compose logs backend
          docker compose logs backend-scheduler
          docker compose logs db
          docker compose logs redis

      - name: Tear Down Stack
        if: always()
        run: docker compose down -v
