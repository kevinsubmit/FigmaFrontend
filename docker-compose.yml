services:
  db:
    image: mysql:8.0
    container_name: nailsdash-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: nailsdash
      MYSQL_USER: nailsdash
      MYSQL_PASSWORD: nailsdash
      MYSQL_ROOT_PASSWORD: nailsdashroot
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pnailsdashroot"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: nailsdash-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    container_name: nailsdash-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.example
    ports:
      - "8000:8000"
    environment:
      EMBEDDED_SCHEDULER_ENABLED: "false"
      REDIS_URL: "redis://redis:6379/0"
      UPLOAD_DIR: "${UPLOAD_DIR:-/app/uploads}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads

  backend-scheduler:
    build:
      context: ./backend
    container_name: nailsdash-backend-scheduler
    restart: unless-stopped
    command: ["python", "-m", "app.scheduler_worker"]
    env_file:
      - ./backend/.env.example
    environment:
      EMBEDDED_SCHEDULER_ENABLED: "true"
      REDIS_URL: "redis://redis:6379/0"
      UPLOAD_DIR: "${UPLOAD_DIR:-/app/uploads}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
    container_name: nailsdash-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.example
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

volumes:
  db_data:
  backend_uploads:
  redis_data:
